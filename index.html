<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín 3D para Ruby 🌻</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #btn-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 999;
        }
        button {
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: #ffeb3b; border: none; border-radius: 50px;
            font-weight: bold; box-shadow: 0 0 20px rgba(255,235,59,0.5);
        }
        #ui { position: fixed; top: 10px; left: 10px; color: #ffeb3b; font-size: 10px; letter-spacing: 2px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">ENGINE: THREE.JS | MODE: GPU_ACCELERATED | TARGET: RUBY</div>

    <div id="btn-container">
        <button onclick="start()">INICIAR EXPERIENCIA 3D</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let scene, camera, renderer, sunflowers = [];
        let isStarted = false;

        function start() {
            document.getElementById('btn-container').style.display = 'none';
            init();
            animate();
        }

        function init() {
            // 1. ESCENA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // 2. CÁMARA
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 40);
            camera.lookAt(0, 5, 0);

            // 3. RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. ILUMINACIÓN (Crucial para no ver negro)
            const light = new THREE.DirectionalLight(0xffffff, 3);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // 5. GENERACIÓN DE GIRASOLES
            for (let i = 0; i < 100; i++) {
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                createSunflower(x, z);
            }

            window.addEventListener('resize', onWindowResize);
        }

        function createSunflower(x, z) {
            const group = new THREE.Group();

            // Tallo curvo con puntos de control (Ingeniería de Curvas)
            const h = 5 + Math.random() * 2;
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3((Math.random()-0.5)*2, h * 0.5, (Math.random()-0.5)*2),
                new THREE.Vector3((Math.random()-0.5)*2, h, 0)
            ]);
            
            const stemGeo = new THREE.TubeGeometry(curve, 20, 0.1, 8, false);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            group.add(stem);

            // Cabeza del girasol
            const head = new THREE.Group();
            const top = curve.getPoint(1);
            head.position.copy(top);
            
            // Centro
            const center = new THREE.Mesh(
                new THREE.CylinderGeometry(0.8, 0.8, 0.3, 24),
                new THREE.MeshStandardMaterial({ color: 0x3b2519 })
            );
            center.rotation.x = Math.PI / 2;
            head.add(center);

            // Pétalos (Bézier Shape)
            const pShape = new THREE.Shape();
            pShape.moveTo(0,0);
            pShape.quadraticCurveTo(0.4, 0.5, 0, 1.5);
            pShape.quadraticCurveTo(-0.4, 0.5, 0, 0);
            const pGeo = new THREE.ShapeGeometry(pShape);
            const pMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, side: THREE.DoubleSide });

            for(let i=0; i<24; i++) {
                const pMesh = new THREE.Mesh(pGeo, pMat);
                const pivot = new THREE.Group();
                pivot.rotation.z = (i / 24) * Math.PI * 2;
                pMesh.position.y = 0.6;
                pMesh.rotation.x = 0.2;
                pivot.add(pMesh);
                head.add(pivot);
            }

            group.add(head);
            group.position.set(x, 0, z);
            group.scale.set(0.1, 0.1, 0.1); // Escala inicial pequeña
            scene.add(group);
            sunflowers.push(group);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            sunflowers.forEach((s, i) => {
                // Crecimiento
                if(s.scale.x < 1) s.scale.addScalar(0.01);
                // Movimiento de viento suave
                s.rotation.x = Math.sin(time + i) * 0.05;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
