<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinity Sunflowers | Para Ruby</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'serif'; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ffeb3b; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 1s;
        }
        canvas { display: block; }
        .ui-overlay {
            position: absolute; top: 20px; left: 20px; color: rgba(255,235,59,0.7);
            pointer-events: none; text-transform: uppercase; letter-spacing: 5px; font-size: 10px;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 24px; margin-bottom: 20px;">COMPILANDO JARDÍN DIGITAL...</div>
    <div id="percent">0%</div>
</div>

<div class="ui-overlay">System: 3D Render Engine v2.0 | Target: Ruby_Chile</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- VARIABLES DE MOTOR ---
    let scene, camera, renderer, composer, controls;
    const sunflowers = [];
    const loader = document.getElementById('loader');
    const percent = document.getElementById('percent');

    function init() {
        // 1. ESCENA Y CÁMARA
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        // 2. RENDERER (NIVEL PROFESIONAL)
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // 3. POST-PROCESADO (Para ese brillo "Bloom" nivel cinematográfico)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;

        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // 4. LUCES
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffeb3b, 10, 100);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 5. GENERACIÓN PROCEDIMENTAL DE GIRASOLES
        createField();

        // 6. CONTROLES
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;

        window.addEventListener('resize', onWindowResize);
        
        // Simular carga de activos
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1000);
        }, 2000);
    }

    function createSunflower(x, z) {
        const group = new THREE.Group();

        // Tallo (Cilindro con ruido)
        const stemGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.position.y = 2;
        group.add(stem);

        // Centro del Girasol (Geometría de Toroide para realismo)
        const centerGeo = new THREE.SphereGeometry(0.5, 32, 32);
        centerGeo.scale(1, 1, 0.5);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        center.position.y = 4;
        center.rotation.x = Math.PI / 2;
        group.add(center);

        // Pétalos (Instanced para rendimiento)
        const petalGeo = new THREE.CapsuleGeometry(0.15, 0.8, 4, 8);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xffeb3b, emissive: 0xffeb3b, emissiveIntensity: 0.2 });
        
        for (let i = 0; i < 24; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            const angle = (i / 24) * Math.PI * 2;
            petal.position.y = 4;
            petal.position.x = Math.cos(angle) * 0.7;
            petal.position.z = Math.sin(angle) * 0.7;
            petal.rotation.z = angle + Math.PI / 2;
            petal.rotation.x = Math.PI / 2.5;
            group.add(petal);
        }

        group.position.set(x, 0, z);
        group.scale.set(0,0,0); // Empezar invisibles para animar
        scene.add(group);
        sunflowers.push(group);
    }

    function createField() {
        for (let i = 0; i < 200; i++) {
            const x = (Math.random() - 0.5) * 60;
            const z = (Math.random() - 0.5) * 60;
            createSunflower(x, z);
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        const time = Date.now() * 0.001;

        sunflowers.forEach((s, i) => {
            // Animación de crecimiento inicial
            if(s.scale.x < 1) {
                s.scale.x += 0.01;
                s.scale.y += 0.01;
                s.scale.z += 0.01;
            }
            // Efecto de viento (Seno y Coseno)
            s.rotation.x = Math.sin(time + i) * 0.05;
            s.rotation.z = Math.cos(time + i) * 0.05;
        });

        controls.update();
        composer.render();
    }

    init();
    animate();
</script>
</body>
</html>
