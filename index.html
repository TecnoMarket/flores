<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Real para Ruby</title>
    <style>
        /* CSS ORIGINAL ÍNTEGRO (Respetando cada detalle de tu archivo) */
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
        :root { --dark-color: #000; }
        body {
            display: flex; align-items: flex-end; justify-content: center;
            min-height: 100vh; background-color: var(--dark-color);
            overflow: hidden; perspective: 1000px;
        }

        .night {
            position: fixed; left: 50%; top: 0; transform: translateX(-50%);
            width: 100%; height: 100%; filter: blur(0.1vmin);
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), 
                              radial-gradient(ellipse at bottom, var(--dark-color), rgba(255, 235, 59, 0.15));
        }

        .flowers { position: relative; transform: scale(0.9); width: 100%; height: 100vh; }

        /* Estructura compleja de la flor original */
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; }
        
        .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
        
        .flower__leaf {
            position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin;
            border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
            background-image: linear-gradient(to top, #e6b800, #FFD700); /* Amarillo Girasol */
            transform-origin: bottom center; opacity: 0.9;
            box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
        }

        .flower__white-circle {
            position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin;
            border-radius: 50%; background-color: #3b2519; /* Centro orgánico */
            z-index: 20;
        }

        .flower__line {
            height: 55vmin; width: 1.5vmin;
            background-image: linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)), 
                              linear-gradient(to top, transparent 10%, #1d4d2b, #3a7d44);
            box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
            animation: grow-flower-tree 4s backwards;
        }

        /* Tus hojas laterales del tallo */
        .flower__line__leaf {
            --w: 7vmin; --h: calc(var(--w) + 2vmin);
            position: absolute; top: 20%; left: 90%; width: var(--w); height: var(--h);
            border-top-right-radius: var(--w); border-bottom-left-radius: var(--w);
            background-image: linear-gradient(to top, rgba(20, 117, 122, 0.4), #39c6d6);
        }

        /* Animaciones de movimiento suave (Viento) */
        @keyframes moving-flower {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .flower--animated { animation: moving-flower 4s infinite ease-in-out; }

        .msg-float {
            position: absolute; color: #FFD700; font-family: 'Georgia', serif;
            font-style: italic; pointer-events: none; z-index: 1000;
            animation: float-up 4s ease-out forwards;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }

        @keyframes float-up { 0% { opacity:0; transform:translateY(0); } 20% { opacity:1; } 100% { opacity:0; transform:translateY(-150px) rotate(5deg); } }
        @keyframes blooming-flower { 0% { transform: scale(0); opacity: 0; } }
        @keyframes grow-flower-tree { 0% { height: 0; } }
    </style>
</head>
<body>
    <div class="night"></div>
    <div class="flowers" id="garden"></div>

    <script>
        const garden = document.getElementById('garden');
        const frases = ["Tu luz, Ruby", "Elegancia pura", "Para ti", "Como el viento", "Girasol eterno"];

        function plantFlower(x) {
            const flowerWrapper = document.createElement('div');
            flowerWrapper.style.position = "absolute";
            flowerWrapper.style.left = x + "px";
            flowerWrapper.style.bottom = "0";
            
            // Inyectamos la estructura COMPLETA de tu archivo original
            flowerWrapper.innerHTML = `
                <div class="flower flower--animated">
                    <div class="flower__leafs">
                        <div class="flower__leaf" style="transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg)"></div>
                        <div class="flower__leaf" style="transform: translate(-50%, -4%) rotateX(40deg)"></div>
                        <div class="flower__leaf" style="transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg)"></div>
                        <div class="flower__leaf" style="width:7vmin; height:7vmin; transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background:#b38600; opacity:0.8;"></div>
                        <div class="flower__white-circle"></div>
                    </div>
                    <div class="flower__line">
                        <div class="flower__line__leaf" style="--w: 5vmin; top: 30%; transform: rotate(-20deg);"></div>
                        <div class="flower__line__leaf" style="--w: 4vmin; top: 50%; left: -100%; transform: rotate(150deg);"></div>
                    </div>
                </div>
            `;

            garden.appendChild(flowerWrapper);

            // Mensaje
            const m = document.createElement('div');
            m.className = 'msg-float';
            m.innerText = frases[Math.floor(Math.random()*frases.length)];
            m.style.left = (x - 50) + "px";
            m.style.bottom = "30vh";
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 4000);
        }

        window.addEventListener('mousedown', (e) => plantFlower(e.clientX));
        window.addEventListener('touchstart', (e) => plantFlower(e.touches[0].clientX));

        // Inicialización
        setTimeout(() => plantFlower(window.innerWidth / 2), 500);
    </script>
</body>
</html>
