<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ruby 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --pink: #ff69b4; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; cursor: pointer; }
        #tsparticles { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); transition: all 1s; }
        h1 { font-family: 'Dancing Script', cursive; font-size: clamp(2.5rem, 8vw, 5rem); color: var(--gold); text-shadow: 0 0 20px rgba(255,204,0,0.6); margin: 0; transition: all 0.5s; }
        .countdown { margin-top: 30px; display: flex; gap: 15px; cursor: help; }
        .box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,204,0,0.2); min-width: 80px; }
        .box span { display: block; font-size: 1.8rem; font-weight: 600; color: var(--gold); }
        .message { max-width: 550px; margin-top: 40px; line-height: 1.8; font-size: 1.1rem; opacity: 0.9; padding: 0 20px; }
        #click-prompt { position: fixed; bottom: 30px; width: 100%; text-align: center; letter-spacing: 2px; animation: pulse 2s infinite; opacity: 0.6; font-size: 0.8rem; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        .hidden { display: none; }
    </style>
</head>
<body onclick="start()">

    <div id="tsparticles"></div>
    <div id="click-prompt">Toca la pantalla para tu sorpresa</div>

    <div class="container hidden" id="content">
        <h1 id="main-title">Flores Amarillas para Ruby</h1>
        
        <div class="countdown" id="special-trigger" title="Haz clic aquí para un secreto">
            <div class="box"><span id="d">0</span>Días</div>
            <div class="box"><span id="h">0</span>Hrs</div>
            <div class="box"><span id="m">0</span>Min</div>
        </div>

        <div class="message" id="text-msg">
            Hoy las flores amarillas inundan las calles, pero ninguna brilla tanto como tú. 
            Aunque estemos a miles de kilómetros, cada día cuenta para volver a vernos. 💛
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const fechaInicio = new Date("2024-01-01T00:00:00").getTime(); // AJUSTA TU FECHA AQUÍ
        let activo = false;

        // --- LÓGICA DEL CONTADOR ---
        function update() {
            const diff = new Date().getTime() - fechaInicio;
            document.getElementById('d').innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById('h').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById('m').innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
        }
        setInterval(update, 1000); update();

        // --- PARTÍCULAS INICIALES (LLUVIA) ---
        function start() {
            if(activo) return; activo = true;
            document.getElementById('click-prompt').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');

            tsParticles.load("tsparticles", {
                particles: {
                    number: { value: 50 },
                    shape: { type: "char", options: { char: { value: ["🌻", "🌼"] } } },
                    move: { enable: true, speed: 2, direction: "bottom", out_mode: "out" },
                    size: { value: 25 },
                    rotate: { animation: { enable: true, speed: 5 } }
                }
            });
        }

        // --- EL SECRETO DEL 808 (O CLIC EN CONTADOR) ---
        document.getElementById('special-trigger').addEventListener('click', (e) => {
            e.stopPropagation(); // Para que no interfiera con el body click
            
            document.getElementById('main-title').innerText = "Eres mi infinito, Ruby";
            document.getElementById('main-title').style.color = "#ff69b4";
            document.getElementById('text-msg').innerHTML = "<b>808 días y contando...</b><br>Construyendo un puente eterno entre Lima y Chile. Te quiero.";

            tsParticles.load("tsparticles", {
                particles: {
                    number: { value: 0 },
                    destroy: { mode: "split", split: { count: 1 } },
                    shape: { type: "heart" },
                    color: { value: ["#ffcc00", "#ff69b4"] },
                    move: { enable: true, speed: { min: 5, max: 15 }, out_mode: "destroy" }
                },
                emitters: {
                    direction: "top",
                    rate: { quantity: 15, delay: 0.1 },
                    position: { x: 50, y: 100 },
                    size: { width: 100, height: 0 }
                }
            });
        });
    </script>
</body>
</html>
