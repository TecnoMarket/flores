<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girasoles Cósmicos | Proyecto Ruby</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            color: #ffcc00; transition: opacity 1s;
        }
        .bar-container { width: 250px; height: 2px; background: #222; margin-top: 20px; }
        .bar-fill { width: 0%; height: 100%; background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        #start-btn {
            display: none; padding: 15px 35px; background: transparent;
            border: 2px solid #ffcc00; color: #ffcc00; cursor: pointer;
            text-transform: uppercase; letter-spacing: 5px; transition: 0.4s;
        }
        #start-btn:hover { background: #ffcc00; color: #000; }
        .message-ui {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #ffcc00; letter-spacing: 10px; font-size: 20px;
            pointer-events: none; text-shadow: 0 0 20px rgba(255,204,0,0.6);
            opacity: 0; transition: 2s;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="load-text">CALIBRANDO GEOMETRÍAS BÉZIER...</div>
    <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
    <button id="start-btn">INICIAR RENDER</button>
</div>

<div class="message-ui" id="msg">RUBY: MI SOL ETERNO</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
    /**
     * PROYECTO: HELIANTHUS V7.0
     * ESTÁNDAR: INGENIERÍA CIVIL / RENDERIZADO GPU
     */

    let scene, camera, renderer, clock, stars, petals = [];
    const sunflowers = [];
    
    // Configuración de la carga
    let progress = 0;
    const bar = document.getElementById('bar');
    const loadText = document.getElementById('load-text');
    const startBtn = document.getElementById('start-btn');

    const loading = setInterval(() => {
        progress += 2;
        bar.style.width = progress + '%';
        if(progress === 40) loadText.innerText = "GENERANDO SISTEMA DE POLEN...";
        if(progress === 80) loadText.innerText = "ESTRUCTURANDO PÉTALOS EN CAPAS...";
        if(progress >= 100) {
            clearInterval(loading);
            loadText.style.display = 'none';
            startBtn.style.display = 'block';
        }
    }, 40);

    startBtn.onclick = () => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').remove();
            document.getElementById('msg').style.opacity = '1';
        }, 1000);
        init();
        animate();
    };

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);
        clock = new THREE.Clock();

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 50);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN DE TRES PUNTOS (Estándar de Renderizado)
        const amb = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(amb);

        const sun = new THREE.DirectionalLight(0xffeb3b, 2.5);
        sun.position.set(20, 50, 20);
        scene.add(sun);

        const fill = new THREE.PointLight(0xffa000, 1, 100);
        fill.position.set(-20, 10, 20);
        scene.add(fill);

        // CREAR ELEMENTOS
        createStars();
        createField();
        
        window.addEventListener('resize', onResize);
    }

    function createStars() {
        const geo = new THREE.BufferGeometry();
        const count = 3000;
        const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5) * 600;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff, transparent: true, opacity: 0.8 });
        stars = new THREE.Points(geo, mat);
        scene.add(stars);
    }

    function createSunflower(x, z) {
        const group = new THREE.Group();

        // 1. TALLO DINÁMICO
        const height = 5 + Math.random() * 3;
        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3((Math.random()-0.5)*3, height*0.5, (Math.random()-0.5)*2),
            new THREE.Vector3((Math.random()-0.5)*2, height, 0)
        ]);
        const stemGeo = new THREE.TubeGeometry(curve, 32, 0.12, 12, false);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x1e4d2b });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        group.add(stem);

        // 2. HOJAS CON GEOMETRÍA DE BÉZIER
        const leafShape = new THREE.Shape();
        leafShape.moveTo(0,0);
        leafShape.bezierCurveTo(0.6, 0.2, 0.9, 1.2, 0, 1.8);
        leafShape.bezierCurveTo(-0.9, 1.2, -0.6, 0.2, 0, 0);
        const leafGeo = new THREE.ShapeGeometry(leafShape);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e5a27, side: THREE.DoubleSide });

        for(let i=0; i<2; i++) {
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            const t = 0.4 + (i * 0.2);
            leaf.position.copy(curve.getPoint(t));
            leaf.lookAt(curve.getPoint(t + 0.1));
            leaf.rotation.z += (i % 2 === 0 ? 1 : -1) * 1.5;
            leaf.scale.set(0.7, 0.7, 0.7);
            group.add(leaf);
        }

        // 3. CABEZA DEL GIRASOL (ESTRUCTURA COMPLEJA)
        const head = new THREE.Group();
        const top = curve.getPoint(1);
        head.position.copy(top);
        head.lookAt(top.clone().add(curve.getTangent(1)));
        head.rotateX(Math.PI/2);

        // Núcleo de Semillas (Efecto de Oclusión)
        const center = new THREE.Mesh(
            new THREE.CylinderGeometry(1.1, 0.9, 0.4, 32),
            new THREE.MeshStandardMaterial({ color: 0x2b1d14, roughness: 1 })
        );
        head.add(center);

        // 4. SISTEMA DE PÉTALOS MULTI-CAPA (Para igualar tu imagen)
        const pShape = new THREE.Shape();
        pShape.moveTo(0,0);
        pShape.quadraticCurveTo(0.4, 0.6, 0, 2.2); // Más largos y finos
        pShape.quadraticCurveTo(-0.4, 0.6, 0, 0);
        const pGeo = new THREE.ShapeGeometry(pShape);
        const pMat = new THREE.MeshStandardMaterial({ 
            color: 0xffcc00, 
            emissive: 0xff8000, 
            emissiveIntensity: 0.15,
            side: THREE.DoubleSide 
        });

        // Capa 1: Exterior (28 pétalos)
        for(let i=0; i<28; i++){
            const pivot = new THREE.Group();
            pivot.rotation.z = (i/28) * Math.PI * 2;
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.y = 0.8;
            p.rotation.x = 0.2;
            pivot.add(p);
            head.add(pivot);
        }
        // Capa 2: Interior (24 pétalos más cortos e inclinados)
        for(let i=0; i<24; i++){
            const pivot = new THREE.Group();
            pivot.rotation.z = ((i+0.5)/24) * Math.PI * 2;
            const p = new THREE.Mesh(pGeo, pMat);
            p.scale.set(0.8, 0.8, 0.8);
            p.position.y = 0.7;
            p.rotation.x = 0.4;
            pivot.add(p);
            head.add(pivot);
        }

        group.add(head);
        group.position.set(x, 0, z);
        group.scale.set(0,0,0);
        scene.add(group);
        sunflowers.push({ mesh: group, delay: Math.random() * 4, head: head });
    }

    function createField() {
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x050505 })
        );
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        for(let i=0; i<120; i++) {
            createSunflower((Math.random()-0.5)*140, (Math.random()-0.5)*140);
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        sunflowers.forEach((s, i) => {
            // Animación de crecimiento
            if(time > s.delay && s.mesh.scale.x < 1) {
                s.mesh.scale.addScalar(0.01);
            }
            // Simulación de viento por vectores
            s.mesh.rotation.x = Math.sin(time * 0.5 + i) * 0.03;
            s.mesh.rotation.z = Math.cos(time * 0.4 + i) * 0.03;
            s.head.rotation.y += Math.sin(time + i) * 0.005;
        });

        // Movimiento de cámara cinemático
        camera.position.x = Math.sin(time * 0.15) * 60;
        camera.position.z = Math.cos(time * 0.15) * 60;
        camera.lookAt(0, 10, 0);

        if(stars) stars.rotation.y += 0.0005;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
