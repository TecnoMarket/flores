<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girasoles 3D - Engineering Edition 🌻</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 100; transition: 1.5s ease;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        .btn-start {
            padding: 15px 40px; border: 2px solid #ffeb3b; background: transparent;
            color: #ffeb3b; font-size: 14px; letter-spacing: 5px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-start:hover { background: #ffeb3b; color: #000; }
        .ui-label {
            position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.3);
            font-size: 10px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start" onclick="initExperience()">Ver Jardín Digital</button>
    </div>

    <div class="ui-label">MODELO: HELIANTHUS 3D v5.0 | SHADER: COSMIC VORTEX</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, clock;
        const sunflowers = [];

        window.initExperience = function() {
            document.getElementById('overlay').classList.add('hidden');
            init();
            animate();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // LUCES
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const point = new THREE.PointLight(0xffcc00, 20, 100);
            point.position.set(10, 20, 10);
            scene.add(point);

            // CREAR JARDÍN (REEMPLAZANDO LOS MODELOS ANTERIORES)
            for(let i=0; i<150; i++) {
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                createSunflower(x, z);
            }

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            window.addEventListener('resize', onWindowResize);
        }

        function createSunflower(x, z) {
            const group = new THREE.Group();

            // 1. TALLO CURVO (CatmullRom)
            const h = 5 + Math.random() * 3;
            const lean = (Math.random() - 0.5) * 2;
            const points = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(lean * 0.3, h * 0.4, (Math.random()-0.5) * 1.5),
                new THREE.Vector3(lean, h, 0)
            ];
            const curve = new THREE.CatmullRomCurve3(points);
            const stemGeo = new THREE.TubeGeometry(curve, 32, 0.1, 12, false);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            group.add(stem);

            // 2. CABEZA DEL GIRASOL
            const head = new THREE.Group();
            const topPos = curve.getPoint(1);
            head.position.copy(topPos);
            head.lookAt(topPos.clone().add(curve.getTangent(1)));
            head.rotateX(Math.PI / 2);

            // Centro (Semillas)
            const centerGeo = new THREE.CylinderGeometry(0.8, 0.7, 0.3, 32);
            const centerMat = new THREE.MeshStandardMaterial({ color: 0x3b2519, roughness: 1 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            head.add(center);

            // 3. PÉTALOS REALISTAS (Bezier Shape)
            const petalShape = new THREE.Shape();
            petalShape.moveTo(0,0);
            petalShape.bezierCurveTo(0.3, 0.2, 0.5, 0.8, 0, 1.5);
            petalShape.bezierCurveTo(-0.5, 0.8, -0.3, 0.2, 0, 0);

            const petalGeo = new THREE.ShapeGeometry(petalShape);
            const petalMat = new THREE.MeshStandardMaterial({ 
                color: 0xffcc00, 
                side: THREE.DoubleSide,
                emissive: 0xffa000,
                emissiveIntensity: 0.1
            });

            const numPetals = 36;
            for(let i=0; i<numPetals; i++) {
                const pivot = new THREE.Group();
                const p = new THREE.Mesh(petalGeo, petalMat);
                pivot.rotation.y = (i / numPetals) * Math.PI * 2;
                p.position.z = 0.65;
                p.rotation.x = -Math.PI / 2 + 0.25;
                pivot.add(p);
                head.add(pivot);
            }

            // 4. HOJAS (Estructura de soporte lateral)
            const leafShape = new THREE.Shape();
            leafShape.moveTo(0,0);
            leafShape.quadraticCurveTo(0.6, 0.6, 0, 1.4);
            leafShape.quadraticCurveTo(-0.6, 0.6, 0, 0);
            const leafGeo = new THREE.ShapeGeometry(leafShape);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x3d7a35, side: THREE.DoubleSide });

            for(let i=0; i<2; i++) {
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                const t = 0.4 + (i * 0.25);
                leaf.position.copy(curve.getPoint(t));
                leaf.lookAt(curve.getPoint(t+0.1));
                leaf.rotation.z += (i%2==0 ? 1 : -1) * 1.2;
                leaf.scale.set(0.7, 0.7, 0.7);
                group.add(leaf);
            }

            group.position.set(x, 0, z);
            group.scale.set(0,0,0);
            scene.add(group);
            sunflowers.push({ mesh: group, delay: Math.random() * 2 });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            sunflowers.forEach((s, i) => {
                if(delta > s.delay && s.mesh.scale.x < 1) {
                    s.mesh.scale.addScalar(0.01);
                }
                // Viento suave (Matemática trigonométrica)
                s.mesh.rotation.x = Math.sin(delta + i) * 0.03;
                s.mesh.rotation.z = Math.cos(delta + i) * 0.03;
            });

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
