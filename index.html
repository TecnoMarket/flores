<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }

        .countdown-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            font-weight: 300;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            min-width: 70px;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }

        .time-box span {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gold);
        }

        .location-tag {
            margin-top: 40px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .btn-audio {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container" id="step-1">
        <h1>¿Me permites un momento?</h1>
        <button class="time-box" style="cursor:pointer; margin-top:30px;" onclick="reveal()">SÍ, CLARO</button>
    </div>

    <div class="container hidden" id="step-2">
        <h1 id="main-title">Flores Amarillas para Ti</h1>
        
        <div class="countdown-container" id="countdown">
            <div class="time-box"><span id="days">0</span>Días</div>
            <div class="time-box"><span id="hours">0</span>Horas</div>
            <div class="time-box"><span id="mins">0</span>Min</div>
        </div>

        <p style="max-width: 500px; line-height: 1.6; margin-top: 30px;">
            Aunque hoy estemos a <b>2,400 km de distancia</b>, 
            mi mente siempre encuentra el camino de regreso a ti. 
            Gracias por ser mi luz, Ruby. 🌻
        </p>

        <div class="location-tag">Lima ➔ Chile</div>
    </div>

    <button class="btn-audio" onclick="toggleAudio()">🎵</button>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Configuración del Contador (Pon aquí la fecha de inicio)
        const startDate = new Date("2024-01-01T00:00:00").getTime(); 

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = now - startDate;

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }

        setInterval(updateCountdown, 1000);

        // Sistema de Partículas Avanzado (Girasoles)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 20 + 10;
                this.speedY = Math.random() * 1 + 0.5;
                this.angle = Math.random() * 360;
                this.spin = Math.random() < 0.5 ? -1 : 1;
            }
            update() {
                this.y -= this.speedY;
                this.angle += this.spin;
                if (this.y < -50) this.y = canvas.height + 50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`;
                ctx.fillText('🌻', 0, 0);
                ctx.restore();
            }
        }

        for(let i=0; i<40; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function reveal() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            toggleAudio();
        }

        function toggleAudio() {
            const audio = document.getElementById('bg-music');
            if (audio.paused) audio.play(); else audio.pause();
        }
    </script>
</body>
</html>
