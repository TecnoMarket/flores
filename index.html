<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girasoles Reales para Ruby</title>
    <style>
        :root {
            --dark: #000;
            --sun-yellow: #FFD700;
            --sun-orange: #fb8500;
            --leaf-green: #2d6a4f;
            --vein-green: #1b4332;
        }

        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
        body {
            display: flex; align-items: flex-end; justify-content: center;
            min-height: 100vh; background-color: var(--dark);
            overflow: hidden; perspective: 1000px;
        }

        .night {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #111, var(--dark));
            z-index: -1;
        }

        .garden { position: relative; width: 100%; height: 100vh; }

        /* CONTENEDOR DE LA FLOR */
        .flower {
            position: absolute; bottom: 0;
            display: flex; flex-direction: column; align-items: center;
            transform-origin: bottom center;
            animation: grow 3s ease-out forwards;
        }

        /* CABEZA: Mirando a la pantalla */
        .flower__head {
            position: relative; width: 15vmin; height: 15vmin;
            z-index: 5; transform: translateY(50%);
        }

        .flower__center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6vmin; height: 6vmin;
            background: radial-gradient(circle, #432818, #221108);
            border-radius: 50%; z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            border: 1px solid #582f0e;
        }

        /* Pétalos en gran cantidad (24 unidades) */
        .petal {
            position: absolute; bottom: 50%; left: 50%;
            width: 3.5vmin; height: 10vmin;
            background: linear-gradient(to top, var(--sun-orange), var(--sun-yellow));
            border-radius: 50% 50% 20% 20%;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.2));
        }

        /* TALLO CURVO */
        .flower__stem {
            width: 1.2vmin;
            background: linear-gradient(to right, #1b4332, #2d6a4f, #1b4332);
            border-radius: 4px;
        }

        /* HOJAS: Verdes, aserradas y con venas */
        .leaf-green {
            position: absolute;
            width: 12vmin; height: 8vmin;
            background-color: var(--leaf-green);
            /* Gradiente para simular venas */
            background-image: 
                linear-gradient(30deg, transparent 45%, var(--vein-green) 50%, transparent 55%),
                linear-gradient(-30deg, transparent 45%, var(--vein-green) 50%, transparent 55%),
                linear-gradient(to right, var(--vein-green) 2px, transparent 2px);
            background-size: 100% 100%;
            
            /* Clip-path para contorno aserrado/dentado */
            clip-path: polygon(
                0% 50%, 15% 20%, 30% 35%, 45% 10%, 60% 25%, 75% 0%, 100% 50%,
                75% 100%, 60% 75%, 45% 90%, 30% 65%, 15% 80%
            );
            transform-origin: left center;
        }

        /* Animaciones */
        @keyframes grow {
            0% { transform: scale(0) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .msg {
            position: absolute; color: var(--sun-yellow);
            font-family: 'Courier New', monospace; font-weight: bold;
            pointer-events: none; animation: float 3s ease-out forwards;
        }

        @keyframes float {
            0% { opacity: 0; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>
    <div class="night"></div>
    <div class="garden" id="garden"></div>

    <script>
        const garden = document.getElementById('garden');
        const frases = ["PARA RUBY", "MIRANDO AL SOL", "JARDÍN REAL", "TE QUIERO"];

        function createFlower(x) {
            const f = document.createElement('div');
            f.className = 'flower';
            const h = Math.random() * 30 + 40; // Altura aleatoria
            const angle = (Math.random() - 0.5) * 20; // Inclinación
            
            f.style.left = x + 'px';
            f.style.transform = `rotate(${angle}deg)`;

            // Generar 24 pétalos para densidad real
            let petals = '';
            for(let i=0; i<24; i++) {
                petals += `<div class="petal" style="transform: translateX(-50%) rotate(${i * 15}deg)"></div>`;
            }

            f.innerHTML = `
                <div class="flower__head">
                    <div class="flower__center"></div>
                    ${petals}
                </div>
                <div class="flower__stem" style="height: ${h}vmin">
                    <div class="leaf-green" style="left: -10vmin; top: 40%; transform: rotate(-20deg) scaleX(-1);"></div>
                    <div class="leaf-green" style="right: -10vmin; top: 60%; transform: rotate(20deg);"></div>
                </div>
            `;

            garden.appendChild(f);

            // Mensaje flotante
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerText = frases[Math.floor(Math.random()*frases.length)];
            m.style.left = x + 'px';
            m.style.bottom = '30vh';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 3000);
        }

        window.addEventListener('mousedown', (e) => createFlower(e.clientX));
        window.addEventListener('touchstart', (e) => createFlower(e.touches[0].clientX));

        // Primera flor de muestra
        setTimeout(() => createFlower(window.innerWidth / 2), 500);
    </script>
</body>
</html>
