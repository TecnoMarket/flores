<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ruby 🌻</title>
    <style>
        *,
        *::after,
        *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #030305;
            --flower-yellow: #FFD700;
            --flower-orange: #FF8C00;
            --stem-green: #1d4d2b;
            --glow-color: rgba(255, 215, 0, 0.3);
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--dark-color);
            overflow: hidden;
            perspective: 1000px;
        }

        /* Fondo Estrellado Suave */
        .night {
            position: fixed;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            filter: blur(0.1vmin);
            background-image: 
                radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), 
                radial-gradient(ellipse at bottom, var(--dark-color), rgba(255, 235, 59, 0.1)), 
                repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px), 
                linear-gradient(90deg, #1d4d2b22, #000);
        }

        .flowers {
            position: relative;
            transform: scale(0.9);
            display: flex;
            justify-content: center;
        }

        /* Estructura Base de la Flor */
        .flower {
            position: absolute;
            bottom: 10vmin;
            transform-origin: bottom center;
            z-index: 10;
            --fl-speed: 0.8s;
        }

        /* Variaciones de flores */
        .flower--1 { left: -20vmin; animation: moving-flower-1 4s linear infinite; }
        .flower--2 { left: 10vmin; transform: rotate(15deg); animation: moving-flower-2 4s linear infinite; }
        .flower--3 { left: -5vmin; transform: rotate(-10deg); animation: moving-flower-3 4s linear infinite; }

        .flower__line {
            height: 60vmin;
            width: 1.5vmin;
            background-image: linear-gradient(to top, var(--stem-green), #3a7d44);
            box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5);
            animation: grow-flower-tree 4s backwards;
        }

        /* PÉTALOS REDONDEADOS */
        .flower__leafs {
            position: relative;
            animation: blooming-flower 2s backwards;
            animation-delay: 1.1s;
        }

        .flower__leafs::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -100%);
            width: 8vmin;
            height: 8vmin;
            background-color: var(--flower-yellow);
            filter: blur(10vmin);
            opacity: 0.4;
        }

        .flower__leaf {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 9vmin;
            height: 13vmin;
            /* Redondeo suave para evitar puntas afiladas */
            border-radius: 50% 50% 45% 45% / 70% 70% 30% 30%;
            background-color: var(--flower-yellow);
            background-image: linear-gradient(to top, var(--flower-orange), var(--flower-yellow));
            transform-origin: bottom center;
            opacity: 0.95;
            box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.3);
        }

        /* Posicionamiento Circular de Pétalos */
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 {
            width: 8vmin; height: 8vmin;
            transform-origin: bottom left;
            border-radius: 4vmin 10vmin 4vmin 4vmin;
            transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
            background-image: linear-gradient(to top, #b38600, var(--flower-yellow));
            z-index: 1;
        }

        /* Centro de la Flor (Simulando Semillas de Girasol) */
        .flower__white-circle {
            position: absolute;
            left: -3.5vmin;
            top: -3vmin;
            width: 9vmin;
            height: 4vmin;
            border-radius: 50%;
            background-color: #3b2519; /* Marrón oscuro */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Luces de ambiente */
        .flower__light {
            position: absolute;
            bottom: 0vmin;
            width: 1vmin;
            height: 1vmin;
            background-color: var(--flower-yellow);
            border-radius: 50%;
            filter: blur(0.2vmin);
            animation: light-ans 4s linear infinite backwards;
        }

        /* Animaciones */
        @keyframes blooming-flower {
            0% { transform: scale(0); opacity: 0; }
        }

        @keyframes grow-flower-tree {
            0% { height: 0; }
        }

        @keyframes moving-flower-1 {
            0%, 100% { transform: rotate(2deg); }
            50% { transform: rotate(-2deg); }
        }

        @keyframes moving-flower-2 {
            0%, 100% { transform: rotate(18deg); }
            50% { transform: rotate(22deg); }
        }

        @keyframes moving-flower-3 {
            0%, 100% { transform: rotate(-18deg); }
            50% { transform: rotate(-12deg); }
        }

        @keyframes light-ans {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20vh); }
        }

        .ruby-text {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: var(--flower-yellow);
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.5rem;
            text-shadow: 0 0 15px var(--flower-yellow);
        }
    </style>
</head>
<body>
    <div class="night"></div>
    <div class="ruby-text">Para Ruby con Amor</div>
    
    <div class="flowers">
        <div class="flower flower--1">
            <div class="flower__leafs flower__leafs--1">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <div class="flower flower--2">
            <div class="flower__leafs flower__leafs--2">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <div class="flower flower--3">
            <div class="flower__leafs flower__leafs--3">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
    </div>
</body>
</html>
